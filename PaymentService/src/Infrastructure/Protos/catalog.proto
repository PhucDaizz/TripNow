syntax = "proto3";

option csharp_namespace = "PaymentService.Infrastructure.Protos";

package catalog.v1; 

service CatalogGrpc {
  rpc GetHotelSummary (GetHotelSummaryRequest) returns (GetHotelSummaryResponse);
}


message GetHotelSummaryRequest {
  string hotel_id = 1;
}

message GetHotelSummaryResponse {
  string hotel_name = 1;
  string owner_id = 2;
  string street = 3;
  string city = 4;
  string country = 5;
  string status = 6;
}
