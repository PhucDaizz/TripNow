version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: travelnow_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: phucdai011
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - travelnow-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: travelnow_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ADMIN
      RABBITMQ_DEFAULT_PASS: ADMIN
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - travelnow-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  auth_service:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    container_name: travelnow_auth_service
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "7001:8080"
    env_file:
      - ./AuthService/Config/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Overrides for Docker Network
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=Auth.TravelNow.Service;user=root;password=phucdai011;
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=ADMIN
      - RabbitMQ__Password=ADMIN
    networks:
      - travelnow-network

  hotel_service:
    build:
      context: ./HotelCatalogService
      dockerfile: Dockerfile
    container_name: travelnow_hotel_service
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "7002:8080"
    env_file:
      - ./HotelCatalogService/src/Config/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Overrides for Docker Network
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=HotelCatalog.TravelNow.Service;user=root;password=phucdai011;
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=ADMIN
      - RabbitMQ__Password=ADMIN
    networks:
      - travelnow-network

  booking_service:
    build:
      context: ./BookingService
      dockerfile: Dockerfile
    container_name: travelnow_booking_service
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "7003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Overrides for Docker Network
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=Booking.TravelNow.Service;user=root;password=phucdai011;
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=ADMIN
      - RabbitMQ__Password=ADMIN
      - ServiceUrls__HotelCatalog=http://hotel_service:8080
      - ServiceUrls__Payment=http://payment_service:8080
    networks:
      - travelnow-network

  payment_service:
    build:
      context: ./PaymentService
      dockerfile: Dockerfile
    container_name: travelnow_payment_service
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "7004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Overrides for Docker Network
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=Payment.TravelNow.Service;user=root;password=phucdai011;
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=ADMIN
      - RabbitMQ__Password=ADMIN
      - ServiceUrls__HotelCatalog=http://hotel_service:8080
    networks:
      - travelnow-network

  api_gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: travelnow_api_gateway
    restart: on-failure
    depends_on:
      - auth_service
      - hotel_service
      - booking_service
      - payment_service
    ports:
      - "7000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    networks:
      - travelnow-network

networks:
  travelnow-network:
    driver: bridge

volumes:
  mysql_data:
  rabbitmq_data:
